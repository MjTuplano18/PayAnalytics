name: Keep Render Backend Alive

on:
  schedule:
    # Runs every 14 minutes — keeps Render free-tier from sleeping
    - cron: "*/14 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -f https://payanalytics.onrender.com/health || echo "Health check failed (backend may be starting up)"
